name: Response Time CI
on:
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: write
jobs:
  response_time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upptime
        uses: upptime/uptime-monitor@master
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          UPDATE_RESPONSE_TIME: true
